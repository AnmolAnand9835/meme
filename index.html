<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Teo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="base">
        <div class="startMenu">
            <div class="start">
                <h2 class="start-title">Choose how you start the Game</h2>
                <button class="single box animated-btn">Single Palyer</button>
                <button class="multi box animated-btn">Multiplayer</button>
            </div>
        </div>
        <div class="showWinner start">
            <h1 class="winner start-title"></h1>
            <button class="box home animated-btn">Home</button>
        </div>
        <div class="container">
            <h1 class="title">Tic Tac Teo | Anmol Anand</h1>
            <div class="game">
                <div class="gameboard">
                    <button class="btn"></button>
                    <button class="btn"></button>
                    <button class="btn"></button>
                    <button class="btn"></button>
                    <button class="btn"></button>
                    <button class="btn"></button>
                    <button class="btn"></button>
                    <button class="btn"></button>
                    <button class="btn"></button>
                </div>
            </div>
            <button class="reset animated-btn">reset</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
